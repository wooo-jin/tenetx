name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - name: Coverage Report
        if: matrix.node-version == 20
        run: npx vitest run --coverage.enabled --coverage.reporter=text --coverage.reporter=json-summary
      - run: npm pack --dry-run
