<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1" />
      <stop offset="50%" style="stop-color:#8b5cf6" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Decorative line -->
  <line x1="60" y1="160" x2="740" y2="160" stroke="url(#accent)" stroke-width="1" opacity="0.4"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="800" height="200" fill="url(#grid)"/>

  <!-- Symbol -->
  <g transform="translate(80, 55)">
    <polygon points="45,0 90,80 0,80" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <polygon points="45,25 72,65 18,65" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <circle cx="45" cy="48" r="4" fill="#8b5cf6" opacity="0.8"/>
  </g>

  <!-- Title -->
  <text x="200" y="95" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="8">TENETX</text>

  <!-- Subtitle -->
  <text x="200" y="125" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="15" fill="#a78bfa" letter-spacing="3" opacity="0.9">PHILOSOPHY-DRIVEN CLAUDE CODE HARNESS</text>

  <!-- Tag -->
  <rect x="200" y="138" width="160" height="22" rx="4" fill="#6366f1" opacity="0.15"/>
  <text x="210" y="153" font-family="'SF Mono', monospace" font-size="11" fill="#a78bfa" opacity="0.8">Declare principles.</text>

  <rect x="370" y="138" width="140" height="22" rx="4" fill="#6366f1" opacity="0.15"/>
  <text x="380" y="153" font-family="'SF Mono', monospace" font-size="11" fill="#a78bfa" opacity="0.8">Generate workflow.</text>

  <rect x="520" y="138" width="150" height="22" rx="4" fill="#6366f1" opacity="0.15"/>
  <text x="530" y="153" font-family="'SF Mono', monospace" font-size="11" fill="#a78bfa" opacity="0.8">Compound growth.</text>
</svg>
