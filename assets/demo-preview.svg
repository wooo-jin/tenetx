<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <!-- Terminal window background -->
  <rect width="800" height="300" rx="10" ry="10" fill="#1e1e2e"/>

  <!-- Window chrome bar -->
  <rect width="800" height="36" rx="10" ry="10" fill="#313244"/>
  <rect y="26" width="800" height="10" fill="#313244"/>

  <!-- Traffic light dots -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>

  <!-- Window title -->
  <text x="400" y="23" text-anchor="middle" font-family="monospace" font-size="12" fill="#6c7086">tenetx</text>

  <!-- Terminal content -->
  <!-- Line 1: prompt + command -->
  <text x="24" y="72" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#a6e3a1">$</text>
  <text x="40" y="72" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#cdd6f4">tenetx</text>

  <!-- Line 2: philosophy load -->
  <text x="24" y="96" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#89b4fa">[tenetx]</text>
  <text x="96" y="96" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#cdd6f4">Philosophy: my-engineering (global)</text>

  <!-- Line 3: scope -->
  <text x="24" y="120" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#89b4fa">[tenetx]</text>
  <text x="96" y="120" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#cdd6f4">Scope: Me(5) │ 3 rules, 2 solutions</text>

  <!-- Line 4: routing -->
  <text x="24" y="144" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#89b4fa">[tenetx]</text>
  <text x="96" y="144" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#cdd6f4">Routing: </text>
  <text x="172" y="144" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#f9e2af">haiku:3</text>
  <text x="228" y="144" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#cdd6f4"> │ </text>
  <text x="252" y="144" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#a6e3a1">sonnet:5</text>
  <text x="316" y="144" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#cdd6f4"> │ </text>
  <text x="340" y="144" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#cba6f7">opus:4</text>

  <!-- Line 5: launching -->
  <text x="24" y="168" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#89b4fa">[tenetx]</text>
  <text x="96" y="168" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#cdd6f4">Starting Claude Code...</text>

  <!-- Separator -->
  <line x1="24" y1="188" x2="776" y2="188" stroke="#313244" stroke-width="1"/>

  <!-- Line 6: Claude Code started -->
  <text x="24" y="210" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#6c7086">╔══════════════════════════════════════╗</text>
  <text x="24" y="230" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#6c7086">║</text>
  <text x="40" y="230" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#a6e3a1">  Claude Code (philosophy-driven mode)  </text>
  <text x="340" y="230" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#6c7086">║</text>
  <text x="24" y="250" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="13" fill="#6c7086">╚══════════════════════════════════════╝</text>

  <!-- Cursor blink -->
  <rect x="24" y="266" width="8" height="16" fill="#cdd6f4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
