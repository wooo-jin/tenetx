name: "frontend-engineering"
version: "1.0.0"
author: "Your Name"

principles:
  user-first:
    belief: "Every decision should improve the user experience"
    generates:
      - "Prioritize perceived performance over raw benchmark scores"
      - "Design interactions for error recovery, not just the happy path"
      - alert: "Flag UI changes that lack loading, error, and empty states"

  accessible-by-default:
    belief: "Accessibility is not optional"
    generates:
      - "Semantic HTML and ARIA roles for every interactive element"
      - "Keyboard navigation and focus management on all components"
      - alert: "Warn when new components omit alt text, roles, or ARIA labels"
      - hook: "PreToolUse → remind to check contrast ratio for new color values"

  performance-budget:
    belief: "Every millisecond of load time costs users"
    generates:
      - "Lazy-load routes and heavy components by default"
      - "Images must be sized, formatted, and lazy-loaded"
      - routing: "explore → Sonnet, implement → Opus"
      - alert: "Alert when bundle size increase exceeds 10 KB gzipped"

  component-isolation:
    belief: "Components should be self-contained and reusable"
    generates:
      - "No component reaches outside its own boundary for data"
      - "Props define the public API; internal state stays internal"
      - alert: "Warn when a component directly reads global store outside a container layer"
