name: "fullstack-engineering"
version: "1.0.0"
author: "Your Name"

principles:
  contract-driven:
    belief: "The API contract is the boundary — both sides must honour it"
    generates:
      - "Define API schemas (OpenAPI / GraphQL) before writing implementation"
      - "Frontend and backend share generated types from a single source of truth"
      - alert: "Warn when frontend makes undocumented API assumptions"

  end-to-end-ownership:
    belief: "Owning the full stack means owning the full user outcome"
    generates:
      - "Trace every user action from UI event to DB write"
      - "Write E2E tests for critical user journeys, not just unit tests"
      - routing: "explore → Sonnet, implement → Opus"

  fail-gracefully:
    belief: "Users should never see a broken experience — degrade, don't crash"
    generates:
      - "Every async UI state has loading, error, and empty variants"
      - "Backend errors return structured error payloads the client can act on"
      - alert: "Flag unhandled promise rejections and missing error boundaries"

  iterate-with-feedback:
    belief: "Ship small, learn fast, improve continuously"
    generates:
      - "Feature flags gate new functionality before full rollout"
      - "Instrument new features with usage metrics from day one"
      - alert: "Warn when a PR ships new UI with no analytics event attached"
