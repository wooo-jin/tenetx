name: "data-engineering"
version: "1.0.0"
author: "Your Name"

principles:
  reproducibility-always:
    belief: "A result you cannot reproduce is a result you cannot trust"
    generates:
      - "Pin all dependency versions; store environment specs alongside notebooks"
      - "Seed random state explicitly in every experiment"
      - alert: "Warn when code reads from mutable paths without version pinning"
      - hook: "UserPromptSubmit → remind to log experiment metadata before running"

  data-quality-first:
    belief: "Garbage in, garbage out — validate data before processing"
    generates:
      - "Schema validation at every pipeline ingestion boundary"
      - "Null checks, range guards, and referential integrity before transforms"
      - alert: "Flag pipeline stages that skip input validation"

  pipeline-reliability:
    belief: "A pipeline that fails silently is worse than one that fails loudly"
    generates:
      - "Idempotent pipeline steps support safe reruns"
      - "Emit row-count and schema-drift metrics after every stage"
      - routing: "explore → Sonnet, implement → Opus"
      - alert: "Warn when a pipeline stage has no failure alerting configured"

  document-the-why:
    belief: "Data decisions age poorly without context"
    generates:
      - "Annotate every feature transformation with business reasoning"
      - "Record data lineage from source to model input"
      - alert: "Flag models or pipelines with no documented data dictionary"
