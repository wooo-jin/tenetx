name: "devops-sre"
version: "1.0.0"
author: "Your Name"

principles:
  automate-everything:
    belief: "Manual processes are bugs waiting to happen"
    generates:
      - "All infrastructure is defined as code and version-controlled"
      - "No manual steps in deploy, rollback, or incident remediation"
      - alert: "Warn when runbooks contain manual steps that could be automated"

  observability-by-design:
    belief: "You are on call for what you ship — make it observable"
    generates:
      - "Every service exposes health, readiness, and metrics endpoints"
      - "Dashboards and alerts are provisioned alongside the service, not after"
      - routing: "explore → Sonnet, implement → Opus"
      - alert: "Block deploys when no alert rule is defined for the new service"

  minimize-blast-radius:
    belief: "Failure is inevitable — limit how far it spreads"
    generates:
      - "Canary or blue/green deployments for all production changes"
      - "Rollback takes under 5 minutes and is tested regularly"
      - alert: "Warn when a change touches more than one service boundary at once"
      - hook: "PreToolUse → require confirmation before destructive infra commands"

  blameless-learning:
    belief: "Incidents are system failures, not human failures"
    generates:
      - "Post-mortems focus on contributing factors, not individual mistakes"
      - "Every incident produces at least one actionable prevention item"
      - alert: "Remind to open a post-mortem issue after P1/P2 incidents"
